version: '3.8'

# izzhilmy's Docker Compose - User Management Database
# Only run PostgreSQL for User Management
# Other team members will connect to this database remotely

services:
  postgres-user:
    image: postgres:16-alpine
    container_name: charity-user-db-izzhilmy
    environment:
      POSTGRES_DB: charity_izz_user
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"  # Exposed to network
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    networks:
      - charity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Redis for queues (can run on one machine only)
  redis:
    image: redis:7-alpine
    container_name: charity-redis-izzhilmy
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - charity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-user-data:
    driver: local
  redis-data:
    driver: local

networks:
  charity-network:
    driver: bridge
