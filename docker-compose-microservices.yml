version: '3.8'

services:
  # User Management - Izz (PostgreSQL 5432)
  db_user:
    image: postgres:16-alpine
    container_name: charity_izz_user_db
    environment:
      POSTGRES_DB: charity_izz_user
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - user_data:/var/lib/postgresql/data
    networks:
      - charity_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Volunteer Management - Sashvini (MariaDB 3307)
  db_volunteer:
    image: mariadb:11.2
    container_name: charity_izz_volunteer_db
    environment:
      MYSQL_DATABASE: charity_izz_volunteer
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - volunteer_data:/var/lib/mysql
    networks:
      - charity_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Event Management - Izzati (PostgreSQL 5433)
  db_event:
    image: postgres:16-alpine
    container_name: charity_izz_event_db
    environment:
      POSTGRES_DB: charity_izz_event
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - event_data:/var/lib/postgresql/data
    networks:
      - charity_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Donation Management - Hannah (MySQL 3306)
  db_donation:
    image: mysql:8.2
    container_name: charity_izz_donation_db
    environment:
      MYSQL_DATABASE: charity_izz_donation
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - donation_data:/var/lib/mysql
    networks:
      - charity_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Recipient Management - Adam (MySQL 3308)
  db_recipient:
    image: mysql:8.2
    container_name: charity_izz_recipient_db
    environment:
      MYSQL_DATABASE: charity_izz_recipient
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3308:3306"
    volumes:
      - recipient_data:/var/lib/mysql
    networks:
      - charity_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for queues and caching
  redis:
    image: redis:7-alpine
    container_name: charity_izz_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - charity_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  charity_network:
    driver: bridge

volumes:
  user_data:
  volunteer_data:
  event_data:
  donation_data:
  recipient_data:
  redis_data:
