version: '3.8'

# izati's Docker Compose - Event Management Database
# Only run PostgreSQL for Event Management
# Other team members will connect to this database remotely

services:
  postgres-event:
    image: postgres:16-alpine
    container_name: charity-event-db-izati
    environment:
      POSTGRES_DB: charity_izz_event
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"  # Exposed to network (host port 5433, container port 5432)
    volumes:
      - postgres-event-data:/var/lib/postgresql/data
    networks:
      - charity-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-event-data:
    driver: local

networks:
  charity-network:
    driver: bridge
